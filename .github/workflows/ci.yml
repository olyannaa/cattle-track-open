name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Rollup native package
        run: |
          ROLLUP_VERSION="$(node -p "require('./node_modules/rollup/package.json').version")"
          npm install --no-save "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000/api/
          VITE_ENV: production

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore backend tests
        run: dotnet restore backend/CAT.Tests/CAT.Tests.csproj

      - name: Run backend tests
        run: dotnet test backend/CAT.Tests/CAT.Tests.csproj --no-restore --configuration Release

  ai-validation:
    name: AI contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate AI contract schemas
        run: python3 scripts/validate_ai_contract_schemas.py

  backend:
    name: Backend Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t cattle-track-backend-ci ./backend/CAT
